<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Palm Cocktails Bar 🌴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Pacifico&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #3a0800;
      --bg2:       #4d1000;
      --bg-dark:   #220400;
      --card:      rgba(255,255,255,0.05);
      --amber:     #d4900a;
      --gold:      #f5d060;
      --gold2:     #ffe080;
      --cream:     #fff5d0;
      --sand:      #c8985a;
      --pink:      #ff3aaa;
      --green:     #2dff7a;
      --logo-bg:   #c85a10;
      --logo-ring: #d4a020;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--cream);
      min-height:100vh;
      overflow-x:hidden;
    }

    /* ── HERO ───────────────────────────────────────────── */
    .hero{
      position:relative;
      padding:32px 20px 28px;
      text-align:center;
      overflow:hidden;
      background:
        radial-gradient(ellipse 90% 60% at 50% -5%, #7a1a00 0%, var(--bg) 65%);
    }
    /* Noise grain */
    .hero::after{
      content:'';position:absolute;inset:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E");
      background-size:256px;opacity:.55;mix-blend-mode:overlay;
    }

    /* ── EMOJI CORNER PALMS (very faint) ── */
    .palm-tl,.palm-tr{
      position:absolute;top:-8px;
      font-size:110px;line-height:1;
      pointer-events:none;user-select:none;
      opacity:0.10;
    }
    .palm-tl{left:-14px;transform:rotate(-15deg);}
    .palm-tr{right:-14px;transform:rotate(15deg) scaleX(-1);}

    /* ── CORNER SVG LEAVES ── */
    .leaf-corner{
      position:absolute;
      pointer-events:none;
      opacity:0.92;
    }
    .leaf-tl{top:-18px;left:-18px;width:280px;height:280px;}
    .leaf-tr{top:-18px;right:-18px;width:280px;height:280px;transform:scaleX(-1) translateX(0);}
    .leaf-bl{bottom:-18px;left:-18px;width:170px;height:170px;}
    .leaf-br{bottom:-18px;right:-18px;width:170px;height:170px;}

    /* ── LOGO ── */
    .logo-wrap{
      position:relative;
      display:inline-block;
      margin-bottom:16px;
      animation:popIn .65s cubic-bezier(.34,1.56,.64,1) both;
      z-index:2;
    }
    .logo-img{
      position:relative;z-index:3;
      width:185px;height:185px;
      border-radius:50%;
      object-fit:cover;
      display:block;
      box-shadow:0 8px 44px rgba(0,0,0,0.7), 0 0 0 3px rgba(212,160,32,0.45);
    }
    .logo-fronds{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-52%);
      width:min(500px,100vw);height:280px;
      pointer-events:none;
      z-index:1;
    }
    @keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

    /* ── HERO TEXT ── */
    .hero-title{
      font-family:'Pacifico',cursive;
      font-size:clamp(34px,9vw,54px);
      color:var(--gold);
      line-height:1.05;
      animation:fadeUp .5s .18s ease both;
      text-shadow:0 3px 18px rgba(0,0,0,0.5), 0 1px 0 rgba(200,120,0,0.4);
      letter-spacing:0.01em;
    }
    .hero-sub{
      font-size:12px;
      color:var(--sand);
      letter-spacing:0.24em;text-transform:uppercase;
      margin-top:6px;
      animation:fadeUp .5s .28s ease both;
      font-weight:400;
    }
    /* Neon signs row */
    .neon-row{
      display:flex;gap:10px;margin-top:16px;
      flex-wrap:wrap;justify-content:center;
      animation:fadeUp .5s .38s ease both;
    }
    .neon{
      padding:5px 13px;border-radius:6px;
      font-size:10px;font-weight:800;
      letter-spacing:0.12em;text-transform:uppercase;
      line-height:1.5;
    }
    .neon-pink{
      color:var(--pink);
      border:2px solid var(--pink);
      text-shadow:0 0 8px var(--pink),0 0 18px rgba(255,58,170,0.4);
      box-shadow:0 0 8px rgba(255,58,170,0.2),inset 0 0 6px rgba(255,58,170,0.07);
      animation:flicker 4s 2s infinite;
    }
    .neon-green{
      color:var(--green);
      border:2px solid var(--green);
      text-shadow:0 0 8px var(--green),0 0 18px rgba(45,255,122,0.4);
      box-shadow:0 0 8px rgba(45,255,122,0.2),inset 0 0 6px rgba(45,255,122,0.07);
    }
    @keyframes flicker{
      0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.4} 94%{opacity:1} 96%{opacity:.6} 97%{opacity:1}
    }
    @keyframes fadeUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* ── SEARCH ── */
    .search-wrap{
      padding:16px 18px 0;
      animation:fadeUp .5s .45s ease both;
    }
    .search-box{position:relative;max-width:480px;margin:0 auto;}
    .search-input{
      width:100%;padding:13px 46px 13px 20px;
      background:rgba(0,0,0,0.22);
      border:1.5px solid rgba(212,160,32,0.3);
      border-radius:50px;color:var(--cream);
      font-size:15px;font-family:'Inter',sans-serif;outline:none;
      transition:border-color .2s,background .2s;
    }
    .search-input::placeholder{color:rgba(255,245,208,.32);}
    .search-input:focus{border-color:rgba(212,160,32,.65);background:rgba(0,0,0,.3);}
    .search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none;}
    .search-results{
      max-width:480px;margin:6px auto 0;
      background:#3d0a00f8;
      border:1px solid rgba(212,160,32,0.22);
      border-radius:14px;overflow:hidden;display:none;
    }
    .search-results.active{display:block;}
    .sr-item{
      padding:11px 16px;border-bottom:1px solid rgba(255,255,255,0.06);
      cursor:pointer;transition:background .15s;
      display:flex;justify-content:space-between;align-items:center;
    }
    .sr-item:last-child{border-bottom:none;}
    .sr-item:hover{background:rgba(255,255,255,0.06);}
    .sr-name{font-weight:500;font-size:14px;}
    .sr-cat{font-size:11px;color:var(--sand);margin-top:2px;}
    .sr-price{color:var(--gold);font-size:14px;font-weight:700;white-space:nowrap;margin-left:8px;}

    /* ── TABS ── */
    .tabs-outer{
      position:sticky;top:0;z-index:100;
      background:rgba(18,2,0,0.94);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(212,160,32,0.14);
    }
    .tabs{display:flex;gap:2px;overflow-x:auto;padding:10px 14px;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{
      display:flex;flex-direction:column;align-items:center;gap:2px;
      padding:7px 14px;border-radius:50px;border:1.5px solid transparent;
      cursor:pointer;white-space:nowrap;transition:all .2s;
      background:transparent;color:rgba(255,245,208,.42);
      font-family:'Inter',sans-serif;
    }
    .tab-icon{font-size:17px;transition:transform .2s;}
    .tab-label{font-size:10px;font-weight:500;letter-spacing:0.04em;}
    .tab:hover .tab-icon{transform:scale(1.15);}
    .tab:hover{background:rgba(212,160,32,0.1);color:var(--gold);}
    .tab.active{background:rgba(212,160,32,0.16);border-color:rgba(212,160,32,0.42);color:var(--gold);}
    .tab.tab-reviews:hover{background:rgba(255,58,170,0.1);color:var(--pink);}
    .tab.tab-reviews.active{background:rgba(255,58,170,0.14);border-color:rgba(255,58,170,0.42);color:var(--pink);}

    /* ── MAIN ── */
    .main{padding:0 16px 80px;max-width:600px;margin:0 auto;}

    /* ── CATEGORY SECTION ── */
    .cat-section{scroll-margin-top:74px;padding-top:36px;}

    /* Category header — Havana-style banner */
    .cat-header-wrap{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(212,160,32,0.15);
      border-radius:12px;
      padding:14px 16px 10px;
      margin-bottom:14px;
    }
    .cat-header{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
    .cat-icon-big{
      font-size:26px;line-height:1;
      animation:wiggle 3s ease-in-out infinite;
    }
    @keyframes wiggle{
      0%,100%{transform:rotate(0deg)} 20%{transform:rotate(-8deg)} 40%{transform:rotate(8deg)} 60%{transform:rotate(-4deg)} 80%{transform:rotate(4deg)}
    }
    .cat-name{
      font-family:'Pacifico',cursive;
      font-size:clamp(20px,5vw,26px);
      color:var(--gold);line-height:1;
      letter-spacing:0.01em;
    }
    .cat-desc{
      font-style:italic;
      font-size:12px;color:var(--sand);
      padding-left:36px;
    }

    .cat-divider{
      display:flex;align-items:center;gap:8px;margin-bottom:14px;margin-top:2px;
    }
    .cdl{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,160,32,0.4),transparent);}
    .cdm{font-size:14px;opacity:.7;}

    /* ── MENU ITEMS ── */
    .items-list{display:flex;flex-direction:column;}
    .menu-item{
      display:flex;justify-content:space-between;align-items:flex-start;
      padding:13px 10px;
      border-bottom:1px solid rgba(255,255,255,0.05);
      cursor:pointer;
      border-radius:10px;margin:0 -10px;
      transition:background .18s, transform .15s;
      position:relative;
    }
    .menu-item:last-child{border-bottom:none;}
    .menu-item:hover{background:rgba(255,255,255,0.05);}
    .menu-item:active{transform:scale(.985);}
    /* Tap ripple hint */
    .menu-item::after{
      content:'›';
      position:absolute;right:4px;top:50%;transform:translateY(-50%);
      font-size:18px;color:rgba(212,160,32,0.25);
      transition:color .2s, transform .2s;
    }
    .menu-item:hover::after{color:rgba(212,160,32,0.55);transform:translateY(-50%) translateX(3px);}

    .item-info{flex:1;min-width:0;padding-right:16px;}
    .item-name{
      font-weight:600;font-size:15px;color:var(--cream);
      display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    }
    .item-desc{
      font-style:italic;font-size:13px;
      color:rgba(255,245,208,.52);margin-top:3px;line-height:1.45;
    }
    .item-price{
      font-family:'Pacifico',cursive;
      font-size:17px;color:var(--gold);
      white-space:nowrap;flex-shrink:0;
      text-shadow:0 1px 8px rgba(200,120,0,0.3);
    }
    .price-curr{
      font-family:'Inter',sans-serif;
      font-size:10px;font-weight:400;
      color:rgba(245,208,96,.55);margin-left:2px;
    }

    .tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:20px;}
    .tag-popular{background:rgba(212,160,32,0.2);color:var(--gold);border:1px solid rgba(212,160,32,0.35);}
    .tag-signature{
      background:rgba(255,58,170,0.14);color:#ff88cc;
      border:1px solid rgba(255,58,170,0.28);
      animation:glowPulse 2.5s ease-in-out infinite;
    }
    @keyframes glowPulse{
      0%,100%{box-shadow:none}
      50%{box-shadow:0 0 6px rgba(255,58,170,0.3)}
    }

    /* ── DRAWER ── */
    .drawer-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:200;
      opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);
    }
    .drawer-overlay.open{opacity:1;pointer-events:all;}
    .drawer{
      position:fixed;bottom:0;left:0;right:0;
      background:linear-gradient(170deg,#5c1200 0%,#2a0500 100%);
      border-radius:24px 24px 0 0;
      border-top:2px solid rgba(212,160,32,0.35);
      padding:8px 24px 44px;z-index:201;
      transform:translateY(100%);
      transition:transform .38s cubic-bezier(.32,.72,0,1);
      max-height:75vh;overflow-y:auto;
    }
    .drawer.open{transform:translateY(0);}
    .drawer-handle{width:44px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:12px auto 22px;}
    .drawer-cat{
      font-size:11px;letter-spacing:.15em;text-transform:uppercase;
      color:var(--amber);margin-bottom:8px;
    }
    .drawer-name{
      font-family:'Pacifico',cursive;
      font-size:30px;color:var(--gold);
      margin-bottom:8px;line-height:1.15;
    }
    .drawer-desc{
      font-style:italic;font-size:16px;
      color:var(--sand);line-height:1.7;margin-bottom:22px;
    }
    .drawer-price-row{
      display:flex;align-items:baseline;gap:8px;
      padding:14px 0;
      border-top:1px solid rgba(255,255,255,.08);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .drawer-price{
      font-family:'Pacifico',cursive;
      font-size:40px;color:var(--gold);
      text-shadow:0 2px 12px rgba(200,120,0,0.35);
    }
    .drawer-curr{font-size:15px;color:rgba(245,208,96,.5);}
    .btn-close{
      width:100%;margin-top:20px;padding:15px;
      background:rgba(212,160,32,0.12);
      border:1.5px solid rgba(212,160,32,0.32);
      border-radius:50px;color:var(--gold);font-size:14px;
      font-family:'Inter',sans-serif;font-weight:600;letter-spacing:.06em;
      cursor:pointer;transition:all .2s;
    }
    .btn-close:hover{background:rgba(212,160,32,.22);}

    /* ── REVIEWS ── */
    #section-reviews{scroll-margin-top:74px;padding-top:36px;}
    .rev-header{
      text-align:center;padding-bottom:20px;
      border-bottom:1px solid rgba(212,160,32,0.12);
      margin-bottom:24px;
    }
    .rev-title{
      font-family:'Pacifico',cursive;
      font-size:28px;color:var(--gold);margin-bottom:4px;
    }
    .rev-stars-big{color:var(--gold);font-size:24px;letter-spacing:3px;margin:6px 0;}
    .rev-avg{font-size:13px;color:var(--sand);}

    .rev-card{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(212,160,32,0.1);
      border-radius:14px;padding:16px;margin-bottom:10px;
      transition:transform .2s;
    }
    .rev-card:hover{transform:translateY(-1px);}
    .rev-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
    .rev-name{font-weight:700;font-size:14px;color:var(--cream);}
    .rev-date{font-size:11px;color:rgba(255,245,208,.3);}
    .rev-stars{color:var(--gold);font-size:15px;margin-bottom:6px;}
    .rev-text{font-style:italic;font-size:14px;color:rgba(255,245,208,.78);line-height:1.6;}

    .write-review{
      background:rgba(255,58,170,0.05);
      border:1px solid rgba(255,58,170,0.2);
      border-radius:16px;padding:22px;margin-top:24px;
    }
    .wr-title{
      font-family:'Pacifico',cursive;
      font-size:22px;color:var(--pink);
      margin-bottom:18px;text-align:center;
    }
    .form-row{margin-bottom:14px;}
    .form-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--sand);margin-bottom:6px;display:block;}
    .form-input{
      width:100%;padding:12px 16px;
      background:rgba(0,0,0,0.22);
      border:1.5px solid rgba(212,160,32,0.2);
      border-radius:10px;color:var(--cream);font-size:14px;
      font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;
    }
    .form-input:focus{border-color:rgba(255,58,170,.5);}
    .form-input::placeholder{color:rgba(255,245,208,.28);}
    textarea.form-input{min-height:90px;resize:vertical;line-height:1.55;}
    .star-picker{display:flex;gap:8px;margin-top:4px;}
    .star-btn{
      font-size:30px;cursor:pointer;
      transition:transform .15s, opacity .15s;
      opacity:.3;background:none;border:none;padding:0;
      color:var(--gold);
    }
    .star-btn.lit{opacity:1;}
    .star-btn:hover{transform:scale(1.25);}
    .char-count{font-size:11px;color:rgba(255,245,208,.3);text-align:right;margin-top:4px;}
    .char-count.warn{color:#ff9966;}
    .btn-submit{
      width:100%;padding:15px;margin-top:8px;
      background:linear-gradient(135deg,rgba(255,58,170,0.25),rgba(255,58,170,0.12));
      border:1.5px solid rgba(255,58,170,0.48);
      border-radius:50px;color:var(--pink);
      font-size:14px;font-family:'Inter',sans-serif;font-weight:700;
      letter-spacing:.07em;cursor:pointer;transition:all .2s;
      box-shadow:0 0 16px rgba(255,58,170,0.12);
    }
    .btn-submit:hover{
      background:linear-gradient(135deg,rgba(255,58,170,0.35),rgba(255,58,170,0.2));
      box-shadow:0 0 24px rgba(255,58,170,0.25);
    }
    .btn-submit:disabled{opacity:.45;cursor:not-allowed;}
    .form-msg{text-align:center;font-size:13px;padding:9px;margin-top:8px;border-radius:8px;display:none;}
    .form-msg.ok{background:rgba(45,255,122,0.1);color:var(--green);}
    .form-msg.err{background:rgba(255,80,80,0.1);color:#ff8888;}

    /* ── FOOTER ── */
    .footer{
      text-align:center;padding:28px 24px 24px;
      border-top:1px solid rgba(255,255,255,0.06);
    }
    .footer-brand{
      font-family:'Pacifico',cursive;
      font-size:20px;color:var(--gold);margin-bottom:5px;
    }
    .footer-loc{font-size:12px;color:rgba(255,245,208,.35);letter-spacing:.1em;}

    /* ── SCROLL TOP ── */
    .scroll-top{
      position:fixed;bottom:22px;right:18px;
      width:44px;height:44px;
      background:var(--gold);color:var(--bg-dark);
      border:none;border-radius:50%;
      font-size:18px;font-weight:700;
      cursor:pointer;opacity:0;transform:translateY(10px);
      transition:all .3s;z-index:99;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 18px rgba(0,0,0,0.4);
    }
    .scroll-top.visible{opacity:1;transform:translateY(0);}
    .scroll-top:hover{transform:translateY(-3px) scale(1.05);}

    /* ── LOADING ── */
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:36vh;gap:14px;color:var(--sand);}
    .spinner{width:36px;height:36px;border:3px solid rgba(212,160,32,.18);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── RESPONSIVE ── */
    @media(min-width:480px){
      .hero{padding:44px 36px 34px;}
      .main{padding:0 24px 80px;}
      .palm-tl,.palm-tr{font-size:140px;}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
    }
  </style>
</head>
<body>

<!-- ── HERO ─────────────────────────────────────────────── -->
<header class="hero">

  <!-- Emoji corner palms (very faint) -->
  <div class="palm-tl">🌴</div>
  <div class="palm-tr">🌴</div>

  <!-- ══ CORNER LEAF CLUSTERS ══ -->
  <!-- Top-left: two overlapping fronds from corner -->
  <svg class="leaf-corner leaf-tl" viewBox="0 0 340 340" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#5a9e20"/>
        <stop offset="40%" stop-color="#2d6e0a"/>
        <stop offset="100%" stop-color="#0e2e04"/>
      </linearGradient>
      <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3a7a10"/>
        <stop offset="100%" stop-color="#0a2002"/>
      </linearGradient>
    </defs>
    <!-- FROND 1: main, going down-right from top-left corner -->
    <!-- rachis spine -->
    <path d="M-10 -10 C30 30 100 100 220 200" stroke="#1a4a06" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- leaflets LEFT of rachis (upper side) - filled shapes -->
    <path d="M8 8 C-5 -5 -20 -8 -30 -4 C-20 2 -5 8 8 8Z" fill="url(#lg1)"/>
    <path d="M20 20 C5 4 -14 -2 -26 4 C-14 12 2 18 20 20Z" fill="url(#lg1)"/>

      <p class="wr-title">Drop a review 🌴</p>
      <div class="form-row">
        <label class="form-label" for="r-name">Your name</label>
        <input class="form-input" type="text" id="r-name" placeholder="e.g. Arta M." maxlength="40"/>
      </div>
      <div class="form-row">
        <label class="form-label">Rating</label>
        <div class="star-picker" id="star-picker">
          <button class="star-btn" data-v="1">★</button>
          <button class="star-btn" data-v="2">★</button>
          <button class="star-btn" data-v="3">★</button>
          <button class="star-btn" data-v="4">★</button>
          <button class="star-btn" data-v="5">★</button>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label" for="r-text">Your review</label>
        <textarea class="form-input" id="r-text" placeholder="Tell us about your night at Palm…" maxlength="300"></textarea>
        <div class="char-count" id="char-count">0 / 300</div>
      </div>
      <button class="btn-submit" id="btn-submit">Send it ✨</button>
      <div class="form-msg" id="form-msg"></div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="footer-brand">🌴 Palm Cocktails Bar</div>
  <div class="footer-loc">Boulevard · Saranda, Albania</div>
</footer>

<!-- DRAWER -->
<div class="drawer-overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div id="drawer-content"></div>
  <button class="btn-close" id="drawer-close">Close</button>
</div>

<button class="scroll-top" id="scroll-top" aria-label="Back to top">↑</button>

<script>
const API = '/api';
let menuData = null;
let selectedRating = 0;
let searchDebounce = null;

async function init() {
  try {
    const res = await fetch(`${API}/menu`);
    menuData = await res.json();
    renderTabs();
    renderMenu();
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:var(--sand);text-align:center">Could not load menu. Try refreshing 🌴</p>';
  }
  loadReviews();
  setupReviewForm();
}

function renderTabs() {
  const c = document.getElementById('tabs');
  menuData.categories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.dataset.id = cat.id;
    btn.innerHTML = `<span class="tab-icon">${cat.icon}</span><span class="tab-label">${cat.name.split(' ')[0]}</span>`;
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`section-${cat.id}`)?.scrollIntoView({behavior:'smooth',block:'start'});
    };
    c.appendChild(btn);
  });
  const rb = document.createElement('button');
  rb.className = 'tab tab-reviews';
  rb.dataset.id = 'reviews';
  rb.innerHTML = `<span class="tab-icon">⭐</span><span class="tab-label">Reviews</span>`;
  rb.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    rb.classList.add('active');
    document.getElementById('section-reviews')?.scrollIntoView({behavior:'smooth',block:'start'});
  };
  c.appendChild(rb);
}

function renderMenu() {
  const container = document.getElementById('menu-sections');
  container.innerHTML = '';
  menuData.categories.forEach(cat => {
    const sec = document.createElement('section');
    sec.className = 'cat-section';
    sec.id = `section-${cat.id}`;
    sec.innerHTML = `
      <div class="cat-header-wrap">
        <div class="cat-header">
          <span class="cat-icon-big">${cat.icon}</span>
          <h2 class="cat-name">${cat.name}</h2>
        </div>
        <p class="cat-desc">${cat.description}</p>
      </div>
      <div class="cat-divider"><div class="cdl"></div><span class="cdm">🌿</span><div class="cdl"></div></div>
      <div class="items-list" id="items-${cat.id}"></div>
    `;
    container.appendChild(sec);
    const list = sec.querySelector(`#items-${cat.id}`);
    cat.items.forEach((item, idx) => {
      const el = makeItemEl(item, cat);
      el.style.animationDelay = `${idx * 0.04}s`;
      list.appendChild(el);
    });
  });
  setupScrollSpy();
}

function makeItemEl(item, cat) {
  const el = document.createElement('div');
  el.className = 'menu-item';
  const tags = (item.tags||[]).map(t => `<span class="tag tag-${t}">${t}</span>`).join('');
  el.innerHTML = `
    <div class="item-info">
      <div class="item-name">${item.name}${tags}</div>
      <div class="item-desc">${item.description}</div>
    </div>
    <div class="item-price">${item.price}<span class="price-curr"> ALL</span></div>
  `;
  el.addEventListener('click', () => openDrawer(item, cat));
  return el;
}

function openDrawer(item, cat) {
  const tags = (item.tags||[]).map(t=>`<span class="tag tag-${t}" style="font-size:11px;padding:3px 10px">${t}</span>`).join(' ');
  document.getElementById('drawer-content').innerHTML = `
    <div class="drawer-cat">${cat.icon} ${cat.name}</div>
    <div class="drawer-name">${item.name} ${tags}</div>
    <div class="drawer-desc">${item.description}</div>
    <div class="drawer-price-row">
      <span class="drawer-price">${item.price}</span>
      <span class="drawer-curr">ALL</span>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('overlay').addEventListener('click', closeDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e => { if(e.key==='Escape') closeDrawer(); });

const si = document.getElementById('search-input');
const sr = document.getElementById('search-results');
si.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  const q = si.value.trim();
  if (!q) { sr.classList.remove('active'); return; }
  searchDebounce = setTimeout(async () => {
    const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if (!data.length) {
      sr.innerHTML = '<div class="sr-item"><span class="sr-name" style="color:var(--sand)">No results</span></div>';
    } else {
      sr.innerHTML = data.slice(0,6).map(r =>
        `<div class="sr-item" data-cat="${r.categoryId}" data-id="${r.id}">
          <div><div class="sr-name">${r.name}</div><div class="sr-cat">${r.category}</div></div>
          <div class="sr-price">${r.price} ALL</div>
        </div>`).join('');
      sr.querySelectorAll('.sr-item').forEach(el => {
        el.addEventListener('click', () => {
          const cat = menuData.categories.find(c => c.id === el.dataset.cat);
          const item = cat?.items.find(i => i.id === parseInt(el.dataset.id));
          if (cat && item) {
            si.value = ''; sr.classList.remove('active');
            document.getElementById(`section-${cat.id}`)?.scrollIntoView({behavior:'smooth'});
            setTimeout(() => openDrawer(item, cat), 400);
          }
        });
      });
    }
    sr.classList.add('active');
  }, 200);
});
document.addEventListener('click', e => { if(!e.target.closest('.search-box')) sr.classList.remove('active'); });

function setupScrollSpy() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id.replace('section-','');
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
        document.querySelector(`.tab[data-id="${id}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
      }
    });
  }, { rootMargin:'-25% 0px -65% 0px' });
  document.querySelectorAll('.cat-section, #section-reviews').forEach(s => obs.observe(s));
}

let reviewPage = 1;
const REVIEWS_PER_PAGE = 5;
let allReviews = [];

async function loadReviews() {
  try {
    const res = await fetch(`${API}/reviews`);
    allReviews = await res.json();
    reviewPage = 1;
    renderReviews();
  } catch(e) {}
}

function renderReviews() {
  const list = document.getElementById('reviews-list');
  if (!allReviews.length) {
    list.innerHTML = '<p style="color:var(--sand);text-align:center;padding:18px 0">No reviews yet — be the first! 🌴</p>';
    document.getElementById('avg-text').textContent = 'No reviews yet';
    return;
  }
  const avg = allReviews.reduce((s,r) => s+r.rating,0) / allReviews.length;
  const rounded = Math.round(avg);
  document.getElementById('avg-stars').textContent = '★'.repeat(rounded)+'☆'.repeat(5-rounded);
  document.getElementById('avg-text').textContent = `${avg.toFixed(1)} / 5 · ${allReviews.length} review${allReviews.length!==1?'s':''}`;

  const totalPages = Math.ceil(allReviews.length / REVIEWS_PER_PAGE);
  const start = (reviewPage - 1) * REVIEWS_PER_PAGE;
  const pageReviews = allReviews.slice(start, start + REVIEWS_PER_PAGE);

  list.innerHTML = pageReviews.map(r => `
    <div class="rev-card">
      <div class="rev-top">
        <span class="rev-name">${esc(r.name)}</span>
        <span class="rev-date">${r.date}</span>
      </div>
      <div class="rev-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
      <div class="rev-text">"${esc(r.text)}"</div>
    </div>`).join('');

  // Pagination controls
  if (totalPages > 1) {
    list.innerHTML += `
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08)">
        <button onclick="changePage(-1)" ${reviewPage === 1 ? 'disabled' : ''}
          style="padding:8px 18px;border-radius:50px;border:1px solid rgba(212,160,32,0.35);
          background:rgba(212,160,32,0.1);color:var(--gold);font-family:'Inter',sans-serif;
          font-size:13px;cursor:pointer;opacity:${reviewPage === 1 ? '0.3' : '1'}">
          ← Prev
        </button>
        <span style="font-size:13px;color:var(--sand)">${reviewPage} / ${totalPages}</span>
        <button onclick="changePage(1)" ${reviewPage === totalPages ? 'disabled' : ''}
          style="padding:8px 18px;border-radius:50px;border:1px solid rgba(212,160,32,0.35);
          background:rgba(212,160,32,0.1);color:var(--gold);font-family:'Inter',sans-serif;
          font-size:13px;cursor:pointer;opacity:${reviewPage === totalPages ? '0.3' : '1'}">
          Next →
        </button>
      </div>`;
  }
}

function changePage(dir) {
  const totalPages = Math.ceil(allReviews.length / REVIEWS_PER_PAGE);
  reviewPage = Math.max(1, Math.min(totalPages, reviewPage + dir));
  renderReviews();
  document.getElementById('section-reviews').scrollIntoView({behavior:'smooth', block:'start'});
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setupReviewForm() {
  const stars = document.querySelectorAll('.star-btn');
  const setStars = v => stars.forEach(s => s.classList.toggle('lit', parseInt(s.dataset.v) <= v));
  stars.forEach(btn => {
    btn.addEventListener('click',    () => { selectedRating = parseInt(btn.dataset.v); setStars(selectedRating); });
    btn.addEventListener('mouseover',() => setStars(parseInt(btn.dataset.v)));
    btn.addEventListener('mouseout', () => setStars(selectedRating));
  });
  const ta = document.getElementById('r-text');
  const cc = document.getElementById('char-count');
  ta.addEventListener('input', () => {
    const l = ta.value.length;
    cc.textContent = `${l} / 300`;
    cc.classList.toggle('warn', l > 250);
  });
  document.getElementById('btn-submit').addEventListener('click', async () => {
    const name = document.getElementById('r-name').value.trim();
    const text = ta.value.trim();
    const msg  = document.getElementById('form-msg');
    const showMsg = (t,type) => { msg.textContent=t; msg.className=`form-msg ${type}`; msg.style.display='block'; setTimeout(()=>msg.style.display='none',4000); };
    if (!name) { showMsg('Add your name first 😊','err'); return; }
    if (!selectedRating) { showMsg('Pick a star rating ★','err'); return; }
    if (!text) { showMsg('Write something about your visit!','err'); return; }
    const btn = document.getElementById('btn-submit');
    btn.disabled=true; btn.textContent='Sending…';
    try {
      const res = await fetch(`${API}/reviews`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,rating:selectedRating,text})
      });
      if (!res.ok) throw new Error();
      document.getElementById('r-name').value='';
      ta.value=''; cc.textContent='0 / 300';
      selectedRating=0; setStars(0);
      showMsg('Posted! Thanks for visiting 🌴','ok');
      loadReviews();
    } catch(e) { showMsg('Something went wrong, try again.','err'); }
    finally { btn.disabled=false; btn.textContent='Send it ✨'; }
  });
}

const stBtn = document.getElementById('scroll-top');
window.addEventListener('scroll', () => stBtn.classList.toggle('visible', window.scrollY > 300));
stBtn.addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));

init();
</script>
